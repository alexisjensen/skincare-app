<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Skin Routine</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f7f4f2">
<style>
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    margin:0;
    padding:18px;
    background:#f7f4f2;
    color:#222;
  }
  .wrap{max-width:760px;margin:0 auto;}
  .card{
    background:#fff;
    border-radius:18px;
    padding:18px;
    box-shadow:0 2px 10px rgba(0,0,0,.06);
    margin-bottom:14px;
  }
  h1{font-size:24px;margin:0 0 10px;}
  h2{font-size:17px;margin:0 0 10px;}
  .sub{
    font-size:13px;
    color:#666;
    margin:0 0 10px;
    line-height:1.4;
  }
  .statusrow{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:12px;
  }
  .pill{
    display:inline-block;
    padding:8px 12px;
    border-radius:999px;
    background:#f1ece8;
    font-size:13px;
  }
  .muted-pill{
    background:#faf7f5;
    color:#666;
  }
  .grid2,.days{
    display:grid;
    gap:10px;
  }
  .grid2{grid-template-columns:repeat(2,1fr);}
  .days{grid-template-columns:repeat(2,1fr);}
  @media (min-width:560px){
    .days{grid-template-columns:repeat(4,1fr);}
  }
  button{
    display:block;
    width:100%;
    text-align:center;
    padding:14px;
    border-radius:14px;
    background:#ece6e2;
    color:#222;
    border:0;
    font-weight:600;
    font-size:16px;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
  }
  button.active{
    background:#222;
    color:#fff;
  }
  button.secondary{
    width:auto;
    padding:8px 12px;
    border-radius:999px;
    background:#faf7f5;
    color:#444;
    font-weight:500;
  }
  ol{margin:0 0 0 22px;padding:0;}
  li{margin-bottom:10px;line-height:1.45;}
  .note{
    margin-top:12px;
    background:#faf7f5;
    padding:10px 12px;
    border-radius:10px;
    font-size:14px;
    color:#555;
    line-height:1.4;
  }
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">

  <div class="card" id="autoCard">
    <div class="statusrow">
      <span class="pill" id="autoTime">AM</span>
      <span class="pill" id="autoDay">Monday</span>
      <span class="pill muted-pill">Auto</span>
    </div>
    <h1>Routine</h1>
    <ol id="autoSteps"></ol>
    <div class="note" id="autoNote"></div>
  </div>

  <div class="card">
    <h2>Time of day</h2>
    <div class="grid2">
      <button id="timeAM" type="button" onclick="setManualTime('AM')">Morning</button>
      <button id="timePM" type="button" onclick="setManualTime('PM')">Night</button>
    </div>
  </div>

  <div class="card">
    <h2>Weekday</h2>
    <p class="sub">Choose a time and a day to preview a manual routine below. The auto routine above stays fixed to the real current day and time.</p>
    <div class="days">
      <button id="dayMon" type="button" onclick="setManualDay('Monday')">Mon</button>
      <button id="dayTue" type="button" onclick="setManualDay('Tuesday')">Tue</button>
      <button id="dayWed" type="button" onclick="setManualDay('Wednesday')">Wed</button>
      <button id="dayThu" type="button" onclick="setManualDay('Thursday')">Thu</button>
      <button id="dayFri" type="button" onclick="setManualDay('Friday')">Fri</button>
      <button id="daySat" type="button" onclick="setManualDay('Saturday')">Sat</button>
      <button id="daySun" type="button" onclick="setManualDay('Sunday')">Sun</button>
    </div>
  </div>

  <div class="card hidden" id="manualCard">
    <div class="statusrow">
      <span class="pill" id="manualTime">AM</span>
      <span class="pill" id="manualDay">Monday</span>
      <span class="pill muted-pill">Manual</span>
      <button class="secondary" type="button" onclick="clearManual()">Clear</button>
    </div>
    <h1>Routine</h1>
    <ol id="manualSteps"></ol>
    <div class="note" id="manualNote"></div>
  </div>

</div>

<script>
(function () {
  var manualTime = null;
  var manualDay = null;

  function routineFor(time, day) {
    if (time === 'AM') {
      return {
        steps: [
          'Cleanse with The Ordinary Glucoside Foaming Cleanser.',
          'Apply Vitamin C.',
          'Apply moisturizer: PDRN Hyaluronic Acid 100 Moisturizing Cream or The Ordinary Natural Moisturizing Factors + PhytoCeramides.',
          'Apply Gopure Tighten & Lift Neck Cream to neck.',
          'Finish with SEPHORA COLLECTION Daily Sunscreen Cream SPF 30.'
        ],
        note: 'Optional: if skin feels dry, add a very small amount of The Ordinary Squalane. Keep it light so sunscreen still sits well.'
      };
    }

    if (day === 'Monday' || day === 'Thursday') {
      return {
        steps: [
          'Cleanse with The Ordinary Glucoside Foaming Cleanser.',
          'Apply The Ordinary Retinol 1% in Squalane.',
          'Apply moisturizer: PDRN Hyaluronic Acid 100 Moisturizing Cream or The Ordinary Natural Moisturizing Factors + PhytoCeramides.',
          'Apply Gopure Tighten & Lift Neck Cream to neck.',
          'If needed, finish with a very small amount of The Ordinary Squalane or 100% Fermented Rose Hip Seed Oil.'
        ],
        note: 'Retinol night. Skip copper peptides tonight.'
      };
    }

    if (day === 'Sunday') {
      return {
        steps: [
          'Cleanse with The Ordinary Glucoside Foaming Cleanser.',
          'Apply your exfoliant.',
          'Apply moisturizer: PDRN Hyaluronic Acid 100 Moisturizing Cream or The Ordinary Natural Moisturizing Factors + PhytoCeramides.',
          'Apply Gopure Tighten & Lift Neck Cream to neck.',
          'If needed, finish with a very small amount of The Ordinary Squalane or 100% Fermented Rose Hip Seed Oil.'
        ],
        note: 'Exfoliation night. Do not use retinol tonight.'
      };
    }

    return {
      steps: [
        'Cleanse with The Ordinary Glucoside Foaming Cleanser.',
        'Apply The Ordinary Multi-Peptide + Copper Peptides 1% Serum.',
        'Apply moisturizer: PDRN Hyaluronic Acid 100 Moisturizing Cream or The Ordinary Natural Moisturizing Factors + PhytoCeramides.',
        'Apply Gopure Tighten & Lift Neck Cream to neck.',
        'If needed, finish with a small amount of The Ordinary Squalane or 100% Fermented Rose Hip Seed Oil.'
      ],
      note: 'Recovery night for hydration, barrier support and calming the skin.'
    };
  }

  function fillList(id, items) {
    var el = document.getElementById(id);
    el.innerHTML = '';
    for (var i = 0; i < items.length; i++) {
      var li = document.createElement('li');
      li.textContent = items[i];
      el.appendChild(li);
    }
  }

  function renderAuto() {
    var now = new Date();
    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var day = days[now.getDay()];
    var time = now.getHours() >= 17 ? 'PM' : 'AM';
    var routine = routineFor(time, day);

    document.getElementById('autoTime').textContent = time;
    document.getElementById('autoDay').textContent = day;
    fillList('autoSteps', routine.steps);
    document.getElementById('autoNote').textContent = routine.note;
  }

  function updateButtons() {
    document.getElementById('timeAM').className = manualTime === 'AM' ? 'active' : '';
    document.getElementById('timePM').className = manualTime === 'PM' ? 'active' : '';

    var map = {
      Monday: 'dayMon',
      Tuesday: 'dayTue',
      Wednesday: 'dayWed',
      Thursday: 'dayThu',
      Friday: 'dayFri',
      Saturday: 'daySat',
      Sunday: 'daySun'
    };
    var days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    for (var i = 0; i < days.length; i++) {
      document.getElementById(map[days[i]]).className = manualDay === days[i] ? 'active' : '';
    }
  }

  function renderManual() {
    updateButtons();
    var card = document.getElementById('manualCard');

    if (!manualTime || !manualDay) {
      card.className = 'card hidden';
      return;
    }

    var routine = routineFor(manualTime, manualDay);
    document.getElementById('manualTime').textContent = manualTime;
    document.getElementById('manualDay').textContent = manualDay;
    fillList('manualSteps', routine.steps);
    document.getElementById('manualNote').textContent = routine.note;
    card.className = 'card';
  }

  window.setManualTime = function (value) {
    manualTime = value;
    renderManual();
  };

  window.setManualDay = function (value) {
    manualDay = value;
    renderManual();
  };

  window.clearManual = function () {
    manualTime = null;
    manualDay = null;
    renderManual();
  };

  renderAuto();
  renderManual();
})();
</script>
</body>
</html>
